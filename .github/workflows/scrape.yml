name: KenyaNews Scraper Pipeline

on:
  schedule:
    - cron: "*/10 * * * *"   # Every 10 minutes
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  scrape-and-publish:
    name: Scrape → Verify → Summarise → Publish → Notify
    runs-on: ubuntu-latest
    timeout-minutes: 9        # Abort before next cron to avoid overlap

    steps:
      # ─────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────
      # 2. Set up Python
      # ─────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      # ─────────────────────────────────────
      # 3. Install dependencies
      # ─────────────────────────────────────
      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ─────────────────────────────────────
      # 4. Cache Hugging Face model
      #    (avoids re-downloading 1.6 GB every run)
      # ─────────────────────────────────────
      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bart-large-cnn-v1
          restore-keys: |
            hf-bart-large-cnn-

      # ─────────────────────────────────────
      # 5. Run pipeline
      # ─────────────────────────────────────
      - name: Run KenyaNews pipeline
        env:
          BACKEND_API_URL:          ${{ secrets.BACKEND_API_URL }}
          BACKEND_API_KEY:          ${{ secrets.BACKEND_API_KEY }}
          RESEND_API_KEY:           ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:        ${{ secrets.RESEND_FROM_EMAIL }}
          NOTIFICATION_RECIPIENTS:  ${{ secrets.NOTIFICATION_RECIPIENTS }}
          FRONTEND_URL:             ${{ secrets.FRONTEND_URL }}
          # Suppress tokenizer parallelism warnings on CPU
          TOKENIZERS_PARALLELISM:   "false"
        run: |
          cd scraper
          python main.py

      # ─────────────────────────────────────
      # 6. Upload logs as artifact (7-day retention)
      # ─────────────────────────────────────
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: scraper/pipeline.log
          retention-days: 7
          if-no-files-found: ignore
