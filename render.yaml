# Render.com deployment configuration for KenyaNews FastAPI backend
services:
  - type: web
    name: kenyanews-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DB_NAME
        value: kenyanews
